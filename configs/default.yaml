seed: 42
project_name: prism_tutor

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_splits: data/splits
  outputs: outputs
  logs: outputs/logs
  generations: outputs/generations
  judge_scores: outputs/judge_scores
  metrics: outputs/metrics
  tables: outputs/tables
  figures: outputs/figures
  human_audit: outputs/human_audit
  paper_artifacts: outputs/paper_artifacts

model:
  generator: Qwen/Qwen3-8B
  dtype: bfloat16
  quantization: null
  max_model_len: 8192
  use_modelscope: true
  enable_thinking: false
  endpoints:
    - base_url: http://localhost:8000/v1
      model: qwen3-8b-gpu0
    - base_url: http://localhost:8001/v1
      model: qwen3-8b-gpu1

generation:
  temperature: 0.2
  top_p: 0.8
  top_k: 20
  # Only the solver runs in thinking mode (it must actually reason through
  # multi-step problems so internal correctness is not a floor for everyone);
  # all other agents stay non-thinking for cost/clean output. The solver also
  # gets a larger token budget to fit a reasoning trace plus the final answer.
  thinking_agents: [solver]
  max_tokens:
    # Solver thinks then emits JSON; 2048 truncated mid-thought on hard multi-step
    # problems (all parse failures were the solver). 4096 lets the trace finish;
    # a deterministic answer-salvage fallback recovers any residual truncations.
    solver: 4096
    agent_internal: 768
    final_response: 384
    verifier: 512
    judge: 768
  timeout_seconds: 120
  retries: 1

risk_weights:
  misconception_risk: 0.30
  pedagogy_risk: 0.25
  answer_uncertainty: 0.20
  leakage_risk: 0.15
  state_conflict_risk: 0.10
  estimated_difficulty: 0.20

# Bucket boundaries on total_risk. Calibrated (on dev/built text, not test) so the
# recalibrated risk estimator produces a non-degenerate low/medium/high split
# instead of routing every sample to "high" (the old over-trigger). low_risk is
# the low/medium boundary; high_risk is the medium/high boundary.
thresholds:
  low_risk: 0.38
  medium_risk: 0.46
  high_risk: 0.55
  # Two-phase commit was over-conservative: correct medium-confidence state
  # updates were shunted to "tentative" and never reached committed state, so
  # external_state_accuracy fell below naive memory. Commit at 0.55 (still gated
  # by the verifier conflict check) so genuine updates are committed.
  misconception_confidence_commit: 0.55
  leakage_block_threshold: 0.50
  state_conflict_block_threshold: 0.40

budget:
  max_rounds: 3
  max_agents: 5
  max_tokens_per_case: 4000
  full_system_max_tokens_per_case: 20000
  # Risk-conditioned deliberation budget: low-risk cases stop after one round so
  # M2/M3 spend fewer rounds/tokens than fixed-round baselines on easy cases.
  rounds_by_bucket:
    low: 1
    medium: 2
    high: 3

cuda:
  expected_gpu_count: 2
  preferred_devices: "2,3"
